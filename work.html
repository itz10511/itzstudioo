<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work | itz.studioo</title>
  <link rel="icon" type="image/png" href="images/favicon.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="cursor-dot"></div>
  <div class="cursor-ring"></div>

  <nav class="nav">
    <a href="index.html" class="nav-logo"><img src="images/logo-s.png" alt="iTZ.STUDiOO" /></a>
    <ul class="nav-links">
      <li><a href="work.html" class="active">Work</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <button class="nav-hamburger" aria-label="menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <header class="page-header">
    <h1 class="page-title">Work</h1>
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">Projects</button>
      <button class="filter-btn" data-filter="photo">Pictures</button>
      <button class="filter-btn" data-filter="film">Film Photos</button>
      <button class="filter-btn" data-filter="video">Video</button>
    </div>
  </header>

  <section class="projects-section">
    <div class="projects-grid" id="projectsGrid"></div>
  </section>

  <div class="proj-detail" id="projDetail" aria-hidden="true">
    <div class="proj-detail-header">
      <span class="proj-detail-name"></span>
      <button class="proj-detail-close" aria-label="Close">✕</button>
    </div>
    <div class="proj-detail-grid" id="projDetailGrid"></div>
  </div>

  <div class="lightbox" id="lightbox" aria-hidden="true">
    <div class="lb-header">
      <span class="lb-title"></span>
      <div class="lb-header-right">
        <span class="lb-counter"></span>
        <button class="lb-close" aria-label="Close">✕</button>
      </div>
    </div>
    <div class="lb-body">
      <button class="lb-prev" aria-label="Previous">←</button>
      <div class="lb-media"></div>
      <button class="lb-next" aria-label="Next">→</button>
    </div>
  </div>

  <footer class="footer">
    <p class="footer-logo">iTZ.STUDiOO</p>
    <p class="footer-copy">&copy; <span id="year"></span> — All rights reserved</p>
    <div class="footer-socials">
      <a href="https://www.instagram.com/ivilla.11/" target="_blank" rel="noopener">Instagram</a>
      <a href="https://www.tiktok.com/@ivilla" target="_blank" rel="noopener">TikTok</a>
    </div>
  </footer>

  <script src="js/projects.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
